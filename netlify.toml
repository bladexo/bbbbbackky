[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 8000
  targetPort = 8000
  publish = "dist"
  autoLaunch = true

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "socket.io"]

[[redirects]]
  from = "/socket.io/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/status"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9" 