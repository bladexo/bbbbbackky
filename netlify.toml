[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  port = 8000
  publish = "dist"

[[redirects]]
  from = "/socket.io/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/status"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "socket.io"] 